version: '3'

tasks:
  default:
    desc: List available tasks
    silent: true
    cmds:
      - task --list

  build:
    desc: Build the server binary
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - bin/mcp-gemini
    cmds:
      - go build -o bin/mcp-gemini .

  test:
    desc: Run the test suite
    cmds:
      - ./run_test.sh

  lint:
    desc: Run golangci-lint with autofix
    cmds:
      - ./run_lint.sh

  fmt:
    desc: Format Go sources with gofmt
    cmds:
      - ./run_format.sh

  vet:
    desc: Run Go vet
    cmds:
      - go vet ./...

  check:
    desc: Run all quality gates
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: test

  run:
    desc: Build and run with stdio transport
    interactive: true
    cmds:
      - task: build
      - ./bin/mcp-gemini -transport=stdio

  run-http:
    desc: Build and run with HTTP transport
    interactive: true
    cmds:
      - task: build
      - ./bin/mcp-gemini -transport=http

  release:
    desc: Tag and publish a GitHub release (requires RELEASE_NOTES.md)
    preconditions:
      - sh: test -f RELEASE_NOTES.md
        msg: RELEASE_NOTES.md is required to publish a release.
    cmds:
      - ./run_release.sh

  tidy:
    desc: Tidy Go module dependencies
    cmds:
      - go mod tidy

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin
